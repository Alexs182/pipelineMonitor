<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connections — DB Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f0e;
      --surface:  #141614;
      --border:   #1f231f;
      --border2:  #2a302a;
      --text:     #d4dbd4;
      --muted:    #5a6b5a;
      --accent:   #3dffa0;
      --accent2:  #00c96e;
      --danger:   #ff4d4d;
      --warning:  #f5a623;
      --mono:     'IBM Plex Mono', monospace;
      --sans:     'IBM Plex Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      gap: 2rem;
      padding: 0 2rem;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 0; margin-left: auto; }
    .nav-links a {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      padding: 0 1rem;
      height: 52px;
      display: flex;
      align-items: center;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Layout ── */
    main {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .page-header {
      margin-bottom: 2.5rem;
    }
    .page-header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-transform: uppercase;
    }
    .page-header p {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      font-family: var(--sans);
      line-height: 1.6;
    }

    /* ── Connection Cards ── */
    #connections-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .conn-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: border-color 0.15s;
      animation: fadeIn 0.2s ease;
    }
    .conn-card:hover { border-color: var(--border2); }

    .conn-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border2);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .conn-status-dot.ok   { background: var(--accent); box-shadow: 0 0 6px var(--accent2); }
    .conn-status-dot.err  { background: var(--danger); }
    .conn-status-dot.testing { background: var(--warning); animation: pulse 1s infinite; }

    .conn-info { flex: 1; min-width: 0; }
    .conn-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
    }
    .conn-url {
      font-size: 0.65rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .conn-latency {
      font-size: 0.65rem;
      color: var(--muted);
      min-width: 60px;
      text-align: right;
      flex-shrink: 0;
    }

    .conn-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .btn-icon {
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      width: 28px;
      height: 28px;
      border-radius: 3px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      transition: all 0.15s;
    }
    .btn-icon:hover { background: var(--border2); color: var(--text); }
    .btn-icon.danger:hover { border-color: var(--danger); color: var(--danger); background: rgba(255,77,77,0.08); }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      border: 1px dashed var(--border2);
      border-radius: 4px;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.05em;
    }

    /* ── Add Form ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem;
    }
    .form-card h2 {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .form-grid .full { grid-column: 1 / -1; }

    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    label {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    input {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 3px;
      padding: 0.55rem 0.75rem;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.75rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .form-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      align-items: center;
    }

    .btn {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.55rem 1.25rem;
      border-radius: 3px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--accent);
      color: #0d0f0e;
      border-color: var(--accent);
    }
    .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost {
      background: none;
      color: var(--muted);
      border-color: var(--border2);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text); }

    .status-msg {
      font-size: 0.68rem;
      margin-left: auto;
      transition: color 0.2s;
    }
    .status-msg.ok  { color: var(--accent); }
    .status-msg.err { color: var(--danger); }

    /* ── Animations ── */
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/">▣ DB Monitor</a>
  <div class="nav-links">
    <a href="/">Dashboard</a>
    <a href="/connections" class="active">Connections</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Manage Connections</h1>
    <p>Add, test, and remove PostgreSQL connections. Credentials are stored server-side in <code>connections.json</code>. Passwords are masked in the UI.</p>
  </div>

  <div id="connections-list">
    <div class="empty-state">Loading connections…</div>
  </div>

  <div class="form-card">
    <h2 id="form-title">Add Connection</h2>
    <div class="form-grid">
      <div class="field">
        <label for="f-name">Identifier</label>
        <input id="f-name" type="text" placeholder="prod_db" autocomplete="off" spellcheck="false" />
      </div>
      <div class="field">
        <label for="f-label">Display Name</label>
        <input id="f-label" type="text" placeholder="Production" />
      </div>
      <div class="field full">
        <label for="f-url">Connection URL</label>
        <input id="f-url" type="text" placeholder="postgresql://user:password@host:5432/dbname" spellcheck="false" />
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" id="btn-test" type="button">Test</button>
      <button class="btn btn-primary" id="btn-save" type="button">Save Connection</button>
      <button class="btn btn-ghost" id="btn-cancel" type="button" style="display:none">Cancel</button>
      <span class="status-msg" id="form-status"></span>
    </div>
  </div>
</main>

<script>
  // ── API Key (persisted in localStorage, prompts once if missing) ───────────

  const LS_KEY = 'db_monitor_api_key';

  function getApiKey() { return localStorage.getItem('dbmon_key') || ''; }
  function setApiKey(k) { localStorage.setItem('dbmon_key', k); }

  if (!getApiKey()) {
    const k = prompt('Enter your API key (saved in browser for future visits):');
    if (k) setApiKey(k);
  }

  async function apiFetch(path, opts = {}) {
    const res = await fetch(path, {
      ...opts,
      headers: {
        'Content-Type': 'application/json',
        'X-API-Key': getApiKey(),
        ...(opts.extraHeaders || {}),
      },
    });
    if (res.status === 401) {
      const k = prompt('API key rejected — re-enter:');
      if (k) { setApiKey(k); return apiFetch(path, opts); }
    }
    return res;
  }

  // ── State ──────────────────────────────────────────────────────────────────

  let editingName = null;

  // ── Render ─────────────────────────────────────────────────────────────────

  async function loadConnections() {
    try {
      const res = await apiFetch('/api/connections');
      const json = await res.json();
      renderList(json.data || []);
      json.data?.forEach(c => checkStatus(c.name));
    } catch (e) {
      document.getElementById('connections-list').innerHTML =
        `<div class="empty-state">Error loading connections: ${e.message}</div>`;
    }
  }

  function renderList(conns) {
    const el = document.getElementById('connections-list');
    if (!conns.length) {
      el.innerHTML = `<div class="empty-state">No connections yet — add one below.</div>`;
      return;
    }
    el.innerHTML = conns.map(c => `
      <div class="conn-card" id="card-${c.name}">
        <div class="conn-status-dot testing" id="dot-${c.name}"></div>
        <div class="conn-info">
          <div class="conn-label">${escHtml(c.label)}<span style="color:var(--muted);font-weight:400"> · ${escHtml(c.name)}</span></div>
          <div class="conn-url">${escHtml(c.urlPreview)}</div>
        </div>
        <div class="conn-latency" id="lat-${c.name}">—</div>
        <div class="conn-actions">
          <button class="btn-icon" title="Edit" onclick="editConn('${c.name}','${escHtml(c.label)}')">✎</button>
          <button class="btn-icon danger" title="Delete" onclick="deleteConn('${c.name}')">✕</button>
        </div>
      </div>
    `).join('');
  }

  async function checkStatus(name) {
    const dot = document.getElementById(`dot-${name}`);
    const lat = document.getElementById(`lat-${name}`);
    if (!dot) return;
    dot.className = 'conn-status-dot testing';

    try {
      const res = await apiFetch('/api/status', { extraHeaders: { 'X-DB-Name': name } });
      const json = await res.json();
      if (json.success && json.data.connected) {
        dot.className = 'conn-status-dot ok';
        lat.textContent = `${json.data.latencyMs}ms`;
      } else {
        dot.className = 'conn-status-dot err';
        lat.textContent = 'error';
      }
    } catch {
      dot.className = 'conn-status-dot err';
      lat.textContent = 'error';
    }
  }

  // ── Form ───────────────────────────────────────────────────────────────────

  function editConn(name, label) {
    editingName = name;
    document.getElementById('f-name').value = name;
    document.getElementById('f-name').disabled = true;
    document.getElementById('f-label').value = label;
    document.getElementById('f-url').value = '';
    document.getElementById('form-title').textContent = `Edit: ${name}`;
    document.getElementById('btn-cancel').style.display = '';
    setStatus('', '');
    document.getElementById('f-url').focus();
  }

  document.getElementById('btn-cancel').addEventListener('click', resetForm);

  function resetForm() {
    editingName = null;
    document.getElementById('f-name').value = '';
    document.getElementById('f-name').disabled = false;
    document.getElementById('f-label').value = '';
    document.getElementById('f-url').value = '';
    document.getElementById('form-title').textContent = 'Add Connection';
    document.getElementById('btn-cancel').style.display = 'none';
    setStatus('', '');
  }

  document.getElementById('btn-test').addEventListener('click', async () => {
    const url = document.getElementById('f-url').value.trim();
    if (!url) { setStatus('Enter a URL first', 'err'); return; }
    setStatus('Testing…', '');
    const res = await apiFetch('/api/connections/test', {
      method: 'POST',
      body: JSON.stringify({ url }),
    });
    const json = await res.json();
    if (json.success) {
      setStatus(`✓ Connected in ${json.latencyMs}ms`, 'ok');
    } else {
      setStatus(`✗ ${json.error}`, 'err');
    }
  });

  document.getElementById('btn-save').addEventListener('click', async () => {
    const name  = document.getElementById('f-name').value.trim();
    const label = document.getElementById('f-label').value.trim();
    const url   = document.getElementById('f-url').value.trim();

    if (!name || !url) { setStatus('Name and URL are required', 'err'); return; }

    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    setStatus('Saving…', '');

    const res = await apiFetch('/api/connections', {
      method: 'POST',
      body: JSON.stringify({ name, label, url }),
    });
    const json = await res.json();
    btn.disabled = false;

    if (json.success) {
      setStatus('✓ Saved', 'ok');
      resetForm();
      await loadConnections();
    } else {
      setStatus(`✗ ${json.error}`, 'err');
    }
  });

  async function deleteConn(name) {
    if (!confirm(`Delete connection "${name}"?`)) return;
    const res = await apiFetch(`/api/connections/${name}`, { method: 'DELETE' });
    const json = await res.json();
    if (json.success) loadConnections();
    else alert(`Failed: ${json.error}`);
  }

  function setStatus(msg, cls) {
    const el = document.getElementById('form-status');
    el.textContent = msg;
    el.className = `status-msg ${cls}`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  loadConnections();
</script>

</body>
</html>
